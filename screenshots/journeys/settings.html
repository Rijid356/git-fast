<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-fast — Settings Journey</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>Settings</h1>
    <p class="subtitle">Home → Settings → Goals</p>

    <div class="flow">
        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Home.png" alt="Home Screen">
                </div>
            </div>
            <div class="phone-label">Home</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Settings</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Settings.png" alt="Settings">
                </div>
            </div>
            <div class="phone-label">Settings</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Goals</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Goals.png" alt="Goals">
                </div>
            </div>
            <div class="phone-label">Goals</div>
        </div>
    </div>
</body>
</html>

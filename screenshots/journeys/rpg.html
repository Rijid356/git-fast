<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-fast — RPG / Character Sheet Journey</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>RPG / Character Sheet</h1>
    <p class="subtitle">Home → Character Sheet (User tab + Juniper tab)</p>

    <div class="flow">
        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Home.png" alt="Home Screen">
                </div>
            </div>
            <div class="phone-label">Home</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Character</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="tab-group">
            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_CharacterSheet_User.png" alt="Character Sheet - User">
                    </div>
                </div>
                <div class="phone-label">ME Tab</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_CharacterSheet_Juniper.png" alt="Character Sheet - Juniper">
                    </div>
                </div>
                <div class="phone-label">Juniper Tab</div>
            </div>
        </div>
    </div>
</body>
</html>

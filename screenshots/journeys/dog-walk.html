<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-fast — Dog Walk Journey</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>Dog Walk</h1>
    <p class="subtitle">Home → Workout (Dog Walk) → Dog Walk Summary → Detail</p>

    <div class="flow">
        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Home.png" alt="Home Screen">
                </div>
            </div>
            <div class="phone-label">Home</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Start Walk</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Workout_DogWalk.png" alt="Dog Walk">
                </div>
            </div>
            <div class="phone-label">Walking</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Stop</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_DogWalkSummary.png" alt="Dog Walk Summary">
                </div>
            </div>
            <div class="phone-label">Summary</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">View Detail</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Detail_DogWalk.png" alt="Dog Walk Detail">
                </div>
            </div>
            <div class="phone-label">Detail</div>
        </div>
    </div>
</body>
</html>

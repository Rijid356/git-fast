<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-fast — History & Detail Journey</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>History & Detail</h1>
    <p class="subtitle">Home → History → Detail (Run / Dog Walk)</p>

    <div class="flow">
        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Home.png" alt="Home Screen">
                </div>
            </div>
            <div class="phone-label">Home</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">View History</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_History.png" alt="History">
                </div>
            </div>
            <div class="phone-label">History</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Tap Workout</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="tab-group">
            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_Detail_Run.png" alt="Run Detail">
                    </div>
                </div>
                <div class="phone-label">Run Detail</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_Detail_DogWalk.png" alt="Dog Walk Detail">
                    </div>
                </div>
                <div class="phone-label">Walk Detail</div>
            </div>
        </div>
    </div>
</body>
</html>

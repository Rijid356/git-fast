<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-fast — Analytics Journey</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>Analytics</h1>
    <p class="subtitle">Home → Analytics Hub → Sub-screens</p>

    <div class="branch-layout">
        <!-- Top row: Home → Analytics Hub -->
        <div class="flow">
            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_Home.png" alt="Home Screen">
                    </div>
                </div>
                <div class="phone-label">Home</div>
            </div>

            <div class="arrow">
                <div class="arrow-label">Analytics</div>
                <div class="arrow-line">→</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_AnalyticsHub.png" alt="Analytics Hub">
                    </div>
                </div>
                <div class="phone-label">Analytics Hub</div>
            </div>
        </div>

        <!-- Down arrow -->
        <div class="arrow-down">
            <div class="arrow-line">↓</div>
            <div class="arrow-label">Tap Section</div>
        </div>

        <!-- Bottom row: all sub-screens -->
        <div class="branch-row">
            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_RouteOverlay.png" alt="Route Overlay">
                    </div>
                </div>
                <div class="phone-label">Route Map</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_RoutePerformance.png" alt="Route Performance">
                    </div>
                </div>
                <div class="phone-label">Route Stats</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_PersonalRecords.png" alt="Personal Records">
                    </div>
                </div>
                <div class="phone-label">Records</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_Trends.png" alt="Trends">
                    </div>
                </div>
                <div class="phone-label">Trends</div>
            </div>

            <div class="phone-container">
                <div class="phone-frame">
                    <div class="phone-screen">
                        <img src="../../app/src/test/snapshots/screens/Screen_BodyComp.png" alt="Body Comp">
                    </div>
                </div>
                <div class="phone-label">Body Comp</div>
            </div>
        </div>
    </div>
</body>
</html>

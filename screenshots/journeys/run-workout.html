<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git-fast — Run Workout Journey</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <h1>Run Workout</h1>
    <p class="subtitle">Home → Workout (Running) → Summary → Detail</p>

    <div class="flow">
        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Home.png" alt="Home Screen">
                </div>
            </div>
            <div class="phone-label">Home</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Start Run</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Workout_Running.png" alt="Running">
                </div>
            </div>
            <div class="phone-label">Running</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">Stop</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_WorkoutSummary.png" alt="Summary">
                </div>
            </div>
            <div class="phone-label">Summary</div>
        </div>

        <div class="arrow">
            <div class="arrow-label">View Details</div>
            <div class="arrow-line">→</div>
        </div>

        <div class="phone-container">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="../../app/src/test/snapshots/screens/Screen_Detail_Run.png" alt="Run Detail">
                </div>
            </div>
            <div class="phone-label">Detail</div>
        </div>
    </div>
</body>
</html>
